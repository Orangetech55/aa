<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Budhjältarna interaktiv zonkarta för Stockholm – redigera zoner, färger och etiketter i realtid."/>
  <title>Budhjältarna – Zonkarta Stockholm</title>

  <!-- Leaflet CSS (CDN) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:ital,wght@0,400;0,500;0,600;1,400&display=swap"
        rel="stylesheet"/>

  <!-- App CSS -->
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- ── TOP BAR ─────────────────────────────────────────── -->
  <div id="topbar">
    <h2>🗺 BUDHJÄLTARNA — ZONKARTA EDITOR</h2>
    <button class="tbtn tbtn-blue"  onclick="resetMapView()">⌂ Återställ vy</button>
    <button class="tbtn tbtn-green" onclick="exportSVG()">⬇ SVG (Illustrator)</button>
  </div>

  <!-- ── MAIN LAYOUT ─────────────────────────────────────── -->
  <div id="main">

    <!-- ADMIN SIDEBAR -->
    <div id="admin">

      <div class="admin-section">
        <h3>Titel &amp; Rubrik</h3>
        <div class="field">
          <label>Titel</label>
          <input type="text" id="cfg-title" value="BUDHJÄLTARNA" oninput="updateHeader()"/>
        </div>
        <div class="field">
          <label>Undertitel</label>
          <input type="text" id="cfg-sub" value="ZONKARTA · STOCKHOLM · PREMIUM BUDTJÄNST" oninput="updateHeader()"/>
        </div>
        <div class="field">
          <label>Titelstorlek</label>
          <input type="range" id="cfg-ts" min="24" max="80" value="48"
                 oninput="syncVal(this,'lbl-ts'); updateHeader()"/>
          <span class="val" id="lbl-ts">48</span>
        </div>
        <div class="field">
          <label>Visa rubrik</label>
          <select id="cfg-sh" onchange="updateHeader()">
            <option value="1">Ja</option>
            <option value="0">Nej</option>
          </select>
        </div>
      </div>

      <div class="admin-section">
        <h3>Zonopacitet (klicka färg för att ändra)</h3>
        <div id="zone-op-rows"></div>
      </div>

      <div class="admin-section">
        <h3>Zonfärger</h3>
        <div id="zone-color-rows"></div>
      </div>

      <div class="admin-section">
        <h3>Zonkanter</h3>
        <div class="field">
          <label>Kantbredd</label>
          <input type="range" id="cfg-sw" min="1" max="10" value="3"
                 oninput="syncVal(this,'lbl-sw'); onStrokeChange()"/>
          <span class="val" id="lbl-sw">3</span>
        </div>
        <div class="field">
          <label>Kantopacitet</label>
          <input type="range" id="cfg-so" min="0" max="100" value="85"
                 oninput="syncVal(this,'lbl-so'); onStrokeChange()"/>
          <span class="val" id="lbl-so">85</span>
        </div>
        <div class="field" style="align-items:flex-start;">
          <label style="margin-top:2px;">Kantstil</label>
          <div class="bstyle-btns" id="bstyle-btns">
            <button class="bs-btn active" onclick="setBorderStyle('solid',this)">Solid</button>
            <button class="bs-btn" onclick="setBorderStyle('dashed',this)">Dashed</button>
            <button class="bs-btn" onclick="setBorderStyle('dotted',this)">Dotted</button>
          </div>
        </div>
      </div>

      <div class="admin-section">
        <h3>Etiketter på kartan</h3>
        <div class="field">
          <label>Etikettstorlek</label>
          <input type="range" id="cfg-zls" min="14" max="52" value="28"
                 oninput="syncVal(this,'lbl-zls'); onLabelSizeChange()"/>
          <span class="val" id="lbl-zls">28</span>
        </div>
        <div class="field">
          <label>Visa ortsnamn</label>
          <select id="cfg-zsub" onchange="onShowSubChange()">
            <option value="1">Ja</option>
            <option value="0">Nej</option>
          </select>
        </div>
      </div>

      <div class="admin-section">
        <h3>Legend</h3>
        <div class="field">
          <label>Visa legend</label>
          <select id="cfg-leg" onchange="updateLegend()">
            <option value="1">Ja</option>
            <option value="0">Nej</option>
          </select>
        </div>
        <div class="field">
          <label>Legendrubrik</label>
          <input type="text" id="cfg-leg-title" value="ZONINDELNING — STOCKHOLM"
                 oninput="updateLegend()"/>
        </div>
      </div>

      <div class="admin-section">
        <h3>Redigera zonetiketter</h3>
        <div id="label-edit-rows"></div>
      </div>

    </div><!-- /admin -->

    <!-- MAP AREA -->
    <div id="map-wrap">

      <!-- Header overlay -->
      <div id="map-header">
        <h1 id="mh-title">BUDHJÄLTARNA</h1>
        <p  id="mh-sub">ZONKARTA · STOCKHOLM · PREMIUM BUDTJÄNST</p>
        <div class="gold-rule"></div>
      </div>

      <!-- Leaflet map -->
      <div id="map"></div>

      <!-- Compass -->
      <svg id="compass-overlay" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg"
           aria-label="Kompassros">
        <circle cx="36" cy="36" r="34" fill="rgba(8,14,24,0.88)"
                stroke="rgba(100,150,230,0.5)" stroke-width="1.5"/>
        <polygon points="36,6 29,38 43,38" fill="#e03030"/>
        <polygon points="36,66 29,38 43,38" fill="#666"/>
        <text x="36" y="4" text-anchor="middle"
              font-family="'Barlow Condensed',sans-serif"
              font-size="14" font-weight="900" fill="white">N</text>
      </svg>

      <!-- Legend -->
      <div id="legend-overlay">
        <h4 id="leg-title">ZONINDELNING — STOCKHOLM</h4>
        <div id="leg-rows"></div>
      </div>

    </div><!-- /map-wrap -->
  </div><!-- /main -->

  <!-- ── SCRIPTS (order matters) ─────────────────────────── -->
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WPaA=" crossorigin=""></script>

  <!-- App scripts -->
  <script src="js/data.js"></script>
  <script src="js/map.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/export.js"></script>

  <!-- Boot -->
  <script>
    // Initialise everything once DOM + scripts are ready
    buildAdminControls();
    rebuildZones();
    rebuildLabels();
    buildLegendRows();
    updateLegend();
  </script>

</body>
</html>
